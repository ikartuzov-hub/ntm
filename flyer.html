<style>
  :root{
    --bg:#0A1A20; --ink:#E8F4F6; --muted:#7FB5C4; --accent:#29B5CF;
    --line:#17333C; --card:#0F2830; --btn:#123039; --rock:#16303A; --rock2:#1B3B46;
  }
  :root[data-theme="light"]{
    --bg:#F1F8FA; --ink:#082830; --muted:#52788A; --accent:#1A8CA3;
    --line:#D6E8ED; --card:#FFFFFF; --btn:#E4F1F5; --rock:#CFE3EA; --rock2:#BBD6DF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:680px;margin:0 auto;padding:0 20px}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
  .brand{display:flex;align-items:center;gap:9px;color:var(--ink)}
  .brandmark{width:26px;height:26px;flex:none}
  .wm{font-family:"Fraunces",serif;font-weight:600;font-size:18px}
  .wm b{color:var(--accent);font-weight:600}
  .topctrl{display:flex;align-items:center;gap:8px}
  .rbtn{width:40px;height:40px;min-width:40px;padding:0;border-radius:50%;border:1px solid var(--line);
    background:var(--btn);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .langwrap{position:relative}
  .menu{position:absolute;right:0;top:46px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:6px;min-width:150px;display:none;z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .menu.open{display:block}
  .menu button{display:flex;gap:10px;align-items:center;width:100%;padding:8px 10px;border-radius:8px;border:none;
    background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:left}
  .menu button:hover{background:var(--btn);color:var(--ink)}
  .menu button.on{color:var(--accent);font-weight:600}
  .menu .code{display:inline-block;width:26px;font-weight:700;font-size:12px}

  .hero{padding:30px 0 10px}
  .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(34px,8vw,54px);line-height:1.08;letter-spacing:-.6px}
  .sub{margin-top:16px;font-size:clamp(15px,2.3vw,18px);color:var(--muted);max-width:48ch}

  /* ── вау-сцена: живая левада ── */
  .scene{margin:28px 0 6px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:var(--card)}
  .scene svg{display:block;width:100%;height:auto}
  .water{fill:none;stroke:var(--accent);stroke-width:3.4;stroke-linecap:round;
    stroke-dasharray:9 11;animation:run 1.15s linear infinite}
  .water.slow{animation-duration:1.9s;opacity:.5;stroke-width:2.4}
  @keyframes run{to{stroke-dashoffset:-20}}
  .mist{opacity:.16;animation:drift 9s ease-in-out infinite alternate}
  @keyframes drift{from{transform:translateX(-14px)}to{transform:translateX(16px)}}
  .hiker{animation:walk 7s linear infinite}
  @keyframes walk{0%{transform:translateX(0)}100%{transform:translateX(300px)}}
  .sun{animation:glow 4.5s ease-in-out infinite alternate}
  @keyframes glow{from{opacity:.55}to{opacity:1}}
  @media(prefers-reduced-motion:reduce){.water,.mist,.hiker,.sun{animation:none}}

  .sceneCap{padding:12px 18px 16px;font-size:13px;color:var(--muted);border-top:1px solid var(--line)}

  .ctaRow{display:flex;flex-wrap:wrap;gap:12px;margin-top:26px}
  .primary{display:inline-flex;align-items:center;gap:9px;background:var(--accent);color:#fff;
    border:none;cursor:pointer;text-decoration:none;font-family:inherit;font-weight:600;font-size:16px;
    padding:14px 26px;border-radius:999px;transition:.15s}
  .primary:hover{transform:translateY(-1px)}
  .ghost{display:inline-flex;align-items:center;gap:8px;background:transparent;border:1px solid var(--line);
    color:var(--ink);text-decoration:none;font-weight:600;font-size:15px;padding:13px 22px;border-radius:999px}
  .ghost:hover{border-color:var(--accent);color:var(--accent)}

  .sec{margin-top:46px}
  h2{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(22px,4.6vw,30px);line-height:1.2}
  .ss{margin-top:10px;font-size:15px;color:var(--muted);max-width:52ch}

  .fgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-top:24px}
  .fcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px}
  .fcard .dot{width:9px;height:9px;border-radius:50%;background:var(--accent);margin-bottom:12px}
  .fcard h3{font-size:15px;font-weight:600;line-height:1.35}
  .fcard .g{margin-top:6px;font-size:14px;color:var(--muted)}

  .payline{margin-top:26px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
  .payline .pt{font-size:14px;color:var(--muted)}
  .payline .pv{font-family:"Fraunces",serif;font-size:clamp(22px,5vw,30px);font-weight:600;color:var(--accent);margin-top:4px}
  .payline .pn{margin-top:10px;font-size:13px;color:var(--muted)}

  .quote{margin-top:24px;background:var(--card);border-left:3px solid var(--accent);border-radius:0 14px 14px 0;padding:18px 20px}
  .quote p{font-size:15px;line-height:1.65}
  .quote .who{margin-top:10px;font-size:13px;color:var(--muted)}

  .steps{display:grid;gap:14px;margin-top:22px}
  .step{display:flex;gap:14px;align-items:flex-start}
  .step .n{flex:none;width:30px;height:30px;border-radius:50%;border:1px solid var(--accent);color:var(--accent);
    display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
  .step p{font-size:15px;color:var(--muted);padding-top:3px}

  .shareRow{text-align:center;margin-top:36px}
  .share{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--muted);
    border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:500;font-size:14px;
    padding:11px 20px;border-radius:999px}
  .share:hover{border-color:var(--accent);color:var(--ink)}
  .disc{margin-top:26px;font-size:12px;color:var(--muted)}

  footer{padding:26px 0 56px;color:var(--muted);font-size:15px;border-top:1px solid var(--line);margin-top:26px;text-align:center}
  footer a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:4px;
    display:inline-block;padding:8px 4px;font-weight:500}
  footer a:hover{color:var(--accent)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>

<div class="topbar">

</div>

<main class="wrap">

    <div class="scene">

        <!-- солнце -->
        <circle class="sun" cx="546" cy="52" r="22" fill="var(--accent)" opacity=".7"/>
        <!-- дальние пики -->
        <path d="M0 150 L90 78 L150 128 L215 62 L300 150 Z" fill="var(--rock)"/>
        <path d="M240 150 L330 66 L400 122 L470 74 L560 150 Z" fill="var(--rock)"/>
        <!-- ближний хребет -->
        <path d="M0 178 L120 108 L215 166 L330 96 L455 168 L560 112 L640 172 L640 260 L0 260 Z" fill="var(--rock2)"/>
        <!-- туман -->
        <g class="mist">
          <ellipse cx="180" cy="146" rx="120" ry="15" fill="var(--ink)"/>
          <ellipse cx="440" cy="132" rx="100" ry="12" fill="var(--ink)"/>
        </g>
        <!-- канал левады: русло -->
        <path d="M-10 214 C90 198 150 232 250 216 C350 200 410 236 510 218 C570 208 610 214 650 208"
              fill="none" stroke="var(--line)" stroke-width="9" stroke-linecap="round"/>
        <!-- бегущая вода -->
        <path class="water" d="M-10 214 C90 198 150 232 250 216 C350 200 410 236 510 218 C570 208 610 214 650 208"/>
        <!-- боковой отвод — «сухая» ветка, поток тоньше -->
        <path class="water slow" d="M250 216 C268 244 300 248 340 246"/>

        <g fill="var(--rock)">
          <circle cx="70" cy="196" r="13"/><circle cx="96" cy="203" r="9"/>
          <circle cx="392" cy="200" r="12"/><circle cx="416" cy="206" r="8"/>
          <circle cx="596" cy="196" r="11"/>
        </g>
        <!-- путник -->
        <g class="hiker">
          <circle cx="140" cy="200" r="4.5" fill="var(--accent)"/>
          <path d="M140 205 v11 M140 209 l-6 5 M140 209 l6 4 M140 216 l-5 9 M140 216 l5 9"
                stroke="var(--accent)" stroke-width="2.4" stroke-linecap="round" fill="none"/>
        </g>
      </svg>
      <div class="sceneCap" id="sceneCap"></div>
    </div>

    <div class="ctaRow">
      <a class="primary" id="ctaCheck" href="./"></a>
      <a class="ghost" id="ctaBot" target="_blank" rel="noopener"></a>
    </div>
  </section>

  <section class="sec">
    <h2 id="featTitle"></h2>
    <p class="ss" id="featSub"></p>
    <div class="fgrid" id="fgrid"></div>
  </section>

  <section class="sec">
    <h2 id="payTitle"></h2>
    <div class="payline">
      <div class="pt" id="payLbl"></div>
      <div class="pv" id="payVal"></div>
      <div class="pn" id="payNote"></div>
    </div>
    <div class="quote">
      <p id="quoteText"></p>
      <div class="who" id="quoteWho"></div>
    </div>
  </section>

  <section class="sec">
    <h2 id="howTitle"></h2>
    <div class="steps">
      <div class="step"><div class="n">1</div><p id="s1"></p></div>
      <div class="step"><div class="n">2</div><p id="s2"></p></div>
      <div class="step"><div class="n">3</div><p id="s3"></p></div>
    </div>
  </section>

  <div class="shareRow"><button class="share" id="shareBtn"></button></div>
  <p class="disc" id="disc"></p>
</main>

<footer class="wrap" id="foot"></footer>

  var VALID=["pt","en","ru","es","de"], lang="pt", theme="night";
  var params=new URLSearchParams(location.search);
  var pl=params.get("lang"), sl=null; try{sl=localStorage.getItem("ntm-lang")}catch(e){}
  if(VALID.indexOf(pl)>=0) lang=pl; else if(VALID.indexOf(sl)>=0) lang=sl;
  var ptm=params.get("theme"), stm=null; try{stm=localStorage.getItem("ntm-theme")}catch(e){}
  theme=(ptm==="light"||ptm==="night")?ptm:(stm==="light"||stm==="night")?stm:"night";
  applyTheme(theme);

  function applyTheme(t){theme=t;
    if(t==="light") document.documentElement.setAttribute("data-theme","light");
    else document.documentElement.removeAttribute("data-theme");
    var b=document.getElementById("themeBtn"); if(b) b.textContent=(t==="light")?"☀":"☾";
    try{localStorage.setItem("ntm-theme",t)}catch(e){}}
  document.getElementById("themeBtn").onclick=function(){applyTheme(theme==="light"?"night":"light")};

  function qp(url){var s="lang="+lang+"&theme="+theme;return url+(url.indexOf("?")>=0?"&":"?")+s}

  var lb=document.getElementById("langBtn"), lm=document.getElementById("langMenu");
  function buildMenu(){lm.innerHTML="";LANGS.forEach(function(l){
    var b=document.createElement("button"); if(l.code===lang) b.className="on";
    var c=document.createElement("span"); c.className="code"; c.textContent=l.code.toUpperCase();
    b.appendChild(c); b.appendChild(document.createTextNode(l.label));
    b.onclick=function(){lm.classList.remove("open"); if(l.code!==lang){lang=l.code; try{localStorage.setItem("ntm-lang",lang)}catch(e){} render();}};
    lm.appendChild(b);});}
  lb.onclick=function(e){e.stopPropagation();var o=lm.classList.toggle("open");lb.setAttribute("aria-expanded",o?"true":"false");if(o)buildMenu();};
  document.addEventListener("click",function(e){if(!e.target.closest(".langwrap")) lm.classList.remove("open");});

  document.getElementById("shareBtn").onclick=function(){
    var t=S[lang]||S.pt, txt=t.shareText+" "+APP+"?lang="+lang, self=this;
    if(navigator.share){navigator.share({text:txt}).catch(function(){})}
    else{(navigator.clipboard?navigator.clipboard.writeText(txt):Promise.reject()).then(function(){
      self.textContent=t.shareCopied; setTimeout(function(){self.textContent=t.shareBtn},1800);
    }).catch(function(){})}
  };

  function render(){
    var t=S[lang]||S.pt, feat=FEAT[lang]||FEAT.pt;
    document.documentElement.lang=lang;
    ["kicker","title","sub","sceneCap","featTitle","featSub","payTitle","payLbl","payVal","payNote",
     "quoteText","quoteWho","howTitle","s1","s2","s3","disc","shareBtn"].forEach(function(id){
      document.getElementById(id).textContent=t[id];
    });
    document.getElementById("ctaCheck").textContent=t.ctaCheck;
    document.getElementById("ctaCheck").href=qp("./");
    document.getElementById("ctaBot").textContent=t.ctaBot;
    document.getElementById("ctaBot").href="https://t.me/SeedWaveBot?start=ntm_"+lang+"_flyer";
    var g=document.getElementById("fgrid"); g.innerHTML="";
    feat.forEach(function(row){
      var d=document.createElement("div"); d.className="fcard";
      var dot=document.createElement("div"); dot.className="dot"; d.appendChild(dot);
      var h=document.createElement("h3"); h.textContent=row[0]; d.appendChild(h);
      var gg=document.createElement("div"); gg.className="g"; gg.textContent=row[1]; d.appendChild(gg);
      g.appendChild(d);
    });
    lb.textContent=lang.toUpperCase();
    document.getElementById("foot").innerHTML='© '+(new Date().getFullYear())+' <a href="'+qp(HUB)+'" target="_blank" rel="noopener">SeedWave</a> · <a href="https://www.linkedin.com/in/igor-kartuzov/" target="_blank" rel="noopener">Igor Kartuzov</a>';
  }
  render();
})();
