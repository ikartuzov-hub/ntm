<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nTm · Novos Trilhos da Madeira</title>
<link rel="icon" type="image/svg+xml" href="ntm-icon.svg">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-title" content="nTm">
<meta name="theme-color" content="#0A1A20">
<meta property="og:title" content="nTm — Aberto hoje?">
<meta property="og:description" content="Trilhos da Madeira ao vivo: aberto ou fechado, tempo real no início do trilho, reserva SIMplifica. 14 percursos, 5 línguas.">
<meta property="og:image" content="https://ikartuzov-hub.github.io/ntm/og-image.png">
<meta property="og:url" content="https://ikartuzov-hub.github.io/ntm/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A1A20; --ink:#E8F4F6; --muted:#7FB5C4; --accent:#29B5CF;
    --line:#17333C; --card:#0F2830; --btn:#123039;
    --ok:#29B5CF; --warn:#E0A63C; --bad:#5B7A85;
  }
  :root[data-theme="light"]{
    --bg:#F1F8FA; --ink:#082830; --muted:#52788A; --accent:#1A8CA3;
    --line:#D6E8ED; --card:#FFFFFF; --btn:#E4F1F5;
    --ok:#1A8CA3; --warn:#B87A1E; --bad:#8AA6AF;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);font-family:"Inter",system-ui,sans-serif;
    line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
  .wrap{max-width:680px;margin:0 auto;padding:0 20px}

  .topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px}
  .brand{display:flex;align-items:center;gap:9px;text-decoration:none;color:var(--ink)}
  .brandmark{width:26px;height:26px;flex:none}
  .wm{font-family:"Fraunces",serif;font-weight:600;font-size:18px;letter-spacing:.2px}
  .wm b{color:var(--accent);font-weight:600}
  .topctrl{display:flex;align-items:center;gap:8px}
  .rbtn{width:40px;height:40px;min-width:40px;padding:0;border-radius:50%;border:1px solid var(--line);
    background:var(--btn);color:var(--ink);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;
    display:flex;align-items:center;justify-content:center}
  .langwrap{position:relative}
  .menu{position:absolute;right:0;top:46px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;padding:6px;min-width:150px;display:none;z-index:40;box-shadow:0 8px 24px rgba(0,0,0,.25)}
  .menu.open{display:block}
  .menu button{display:flex;gap:10px;align-items:center;width:100%;padding:8px 10px;border-radius:8px;border:none;
    background:transparent;color:var(--muted);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;text-align:left}
  .menu button:hover{background:var(--btn);color:var(--ink)}
  .menu button.on{color:var(--accent);font-weight:600}
  .menu .code{display:inline-block;width:26px;font-weight:700;font-size:12px}

  .hero{padding:26px 0 8px}
  .kicker{font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:14px}
  h1{font-family:"Fraunces",serif;font-weight:600;font-size:clamp(30px,7vw,46px);line-height:1.1;letter-spacing:-.4px}
  .sub{margin-top:14px;font-size:clamp(15px,2.2vw,17px);color:var(--muted);max-width:48ch}

  /* ── живая левада ── */
  .levadaBox{margin-top:26px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
  .levadaBox svg{display:block;min-width:640px;width:100%;height:76px}
  .seg{fill:none;stroke-width:5;stroke-linecap:round}
  .seg.flow{stroke:var(--accent);stroke-dasharray:7 9;animation:flow 1.1s linear infinite}
  .seg.dry{stroke:var(--bad);stroke-dasharray:2 10;opacity:.55}
  @keyframes flow{to{stroke-dashoffset:-16}}
  .node{cursor:pointer}
  .node circle.open{fill:var(--accent);stroke:none}
  .node circle.partial{fill:none;stroke:var(--warn);stroke-width:3.5}
  .node circle.closed{fill:none;stroke:var(--bad);stroke-width:3}
  .node circle.unknown{fill:none;stroke:var(--muted);stroke-width:2;stroke-dasharray:3 3}
  .node text{font-family:"Inter",sans-serif;font-size:9.5px;font-weight:600;fill:var(--muted);text-anchor:middle}
  @media(prefers-reduced-motion:reduce){.seg.flow{animation:none}}

  /* ── одометр ── */
  .odo{margin-top:14px;display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 18px}
  .odo .big{font-family:"Fraunces",serif;font-size:clamp(26px,6vw,36px);font-weight:600;color:var(--accent)}
  .odo .lbl{font-size:13px;color:var(--muted)}
  .contrast{margin-top:6px;font-size:14px;color:var(--muted)}
  .contrast b{color:var(--ink);font-weight:600}
  .stamp{margin-top:10px;font-size:12px;color:var(--muted)}
  .stamp a{color:var(--muted)}

  /* ── фильтры ── */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:26px 0 4px}
  .fchip{border:1px solid var(--line);background:var(--btn);color:var(--muted);font-family:inherit;
    font-size:13px;font-weight:500;border-radius:999px;padding:7px 14px;cursor:pointer}
  .fchip.on{border-color:var(--accent);color:var(--accent);font-weight:600}

  /* ── карточки троп ── */
  .cards{display:grid;gap:14px;margin-top:18px}
  .tcard{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;scroll-margin-top:20px}
  .tcard.closed{opacity:.72}
  .thead{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
  .pr{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.08em;color:var(--accent);
    border:1px solid var(--accent);border-radius:6px;padding:1px 7px;margin-bottom:6px}
  .tcard h3{font-size:16px;font-weight:600;line-height:1.35}
  .schip{flex:none;font-size:12px;font-weight:600;border-radius:999px;padding:3px 11px;white-space:nowrap}
  .schip.open{background:var(--accent);color:#fff}
  .schip.partial{border:1px solid var(--warn);color:var(--warn)}
  .schip.closed{border:1px solid var(--bad);color:var(--bad)}
  .schip.unknown{border:1px solid var(--muted);color:var(--muted)}
  .hl{margin-top:8px;font-size:14px;color:var(--muted)}
  .meta{display:flex;flex-wrap:wrap;gap:6px 16px;margin-top:10px;font-size:13px;color:var(--muted)}
  .meta b{color:var(--ink);font-weight:600}
  .wx{margin-top:10px;font-size:14px;display:flex;flex-wrap:wrap;gap:6px 14px;align-items:center}
  .wx .t{font-weight:600;color:var(--ink)}
  .note{margin-top:9px;font-size:13px;color:var(--warn)}
  .trow{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-top:13px;
    border-top:1px solid var(--line);padding-top:12px}
  .fee{font-size:14px;color:var(--muted)}
  .fee b{font-family:"Fraunces",serif;color:var(--ink);font-size:16px}
  .book{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#fff;text-decoration:none;
    font-weight:600;font-size:14px;padding:10px 18px;border-radius:999px;transition:.15s}
  .book:hover{transform:translateY(-1px)}
  .book.off{background:var(--btn);color:var(--muted);pointer-events:none}

  /* ── секрет недели ── */
  .secret{margin-top:34px;background:var(--card);border:1px solid var(--accent);border-radius:16px;padding:20px}
  .secret .sk{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);font-weight:600}
  .secret h3{font-family:"Fraunces",serif;font-size:20px;font-weight:600;margin-top:8px}
  .secret p{margin-top:8px;font-size:14px;color:var(--muted)}
  .sig{margin-top:12px;font-size:13px;color:var(--ink);font-weight:500}
  .moreSecrets{display:inline-flex;margin-top:14px;background:transparent;border:1px solid var(--accent);color:var(--accent);
    text-decoration:none;font-weight:600;font-size:14px;padding:10px 18px;border-radius:999px}

  /* ── Dubai Madeira (поведенческий) ── */
  .dm{display:none;margin-top:22px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:20px}
  .dm.on{display:block}
  .dm .sk{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .dm h3{font-family:"Fraunces",serif;font-size:19px;font-weight:600;margin-top:8px}
  .dm p{margin-top:8px;font-size:14px;color:var(--muted)}
  .dm a{display:inline-flex;margin-top:14px;background:var(--btn);border:1px solid var(--line);color:var(--ink);
    text-decoration:none;font-weight:600;font-size:14px;padding:10px 18px;border-radius:999px}
  .dm a:hover{border-color:var(--accent)}

  .shareRow{text-align:center;margin-top:30px}
  .share{display:inline-flex;align-items:center;gap:8px;background:transparent;color:var(--muted);
    border:1px solid var(--line);cursor:pointer;font-family:inherit;font-weight:500;font-size:14px;
    padding:11px 20px;border-radius:999px;transition:.15s}
  .share:hover{border-color:var(--accent);color:var(--ink)}
  .disc{margin-top:26px;font-size:12px;color:var(--muted)}

  footer{padding:26px 0 56px;color:var(--muted);font-size:15px;border-top:1px solid var(--line);margin-top:26px;text-align:center}
  footer a{color:var(--ink);text-decoration:underline;text-decoration-color:var(--accent);text-underline-offset:4px;
    display:inline-block;padding:8px 4px;font-weight:500}
  footer a:hover{color:var(--accent)}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <svg class="brandmark" viewBox="0 0 100 100" fill="none" stroke="var(--accent)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" role="img" aria-label="nTm">
      <path d="M28 22 H72"/>
      <path d="M50 22 V68"/>
      <path d="M15 84 Q28 78 39 84 Q50 90 61 84 Q72 78 85 84"/>
    </svg>
    <span class="wm">n<b>T</b>m</span>
  </div>
  <div class="topctrl">
    <div class="langwrap">
      <button class="rbtn" id="langBtn" aria-haspopup="true" aria-expanded="false" aria-label="Language">PT</button>
      <div class="menu" id="langMenu"></div>
    </div>
    <button class="rbtn" id="themeBtn" aria-label="Theme">☾</button>
  </div>
</div>

<main class="wrap">
  <section class="hero">
    <div class="kicker" data-ui="kicker"></div>
    <h1 data-ui="heroTitle"></h1>
    <p class="sub" data-ui="heroSub"></p>

    <div class="levadaBox"><svg id="levada" aria-hidden="true"></svg></div>

    <div class="odo">
      <span class="big"><span id="odoN">0</span><span id="odoOf"></span></span>
      <span class="lbl" data-ui="odoLabel"></span>
    </div>
    <div class="contrast" id="contrast"></div>
    <div class="stamp" id="stamp"></div>
  </section>

  <div class="chips" id="chips"></div>
  <div class="cards" id="cards"></div>

  <section class="secret" id="secretBox" style="display:none">
    <div class="sk" data-ui="secretKicker"></div>
    <h3 id="secretTitle"></h3>
    <p id="secretText"></p>
    <div class="sig" id="secretSig"></div>
    <a class="moreSecrets" id="moreSecrets" target="_blank" rel="noopener" style="display:none" data-ui="secretMore"></a>
  </section>

  <section class="dm" id="dmBox">
    <div class="sk" data-ui="dmKicker"></div>
    <h3 data-ui="dmTitle"></h3>
    <p data-ui="dmText"></p>
    <a id="dmBtn" target="_blank" rel="noopener" data-ui="dmBtn"></a>
  </section>

  <div class="shareRow"><button class="share" id="shareBtn" data-ui="shareBtn"></button></div>
  <p class="disc" data-ui="disclaimer"></p>
</main>

<footer class="wrap" id="foot"></footer>

<script>
(function(){
  var FALLBACK_LANGS=[{code:"pt",label:"Português"},{code:"en",label:"English"},{code:"ru",label:"Русский"},{code:"es",label:"Español"},{code:"de",label:"Deutsch"}];
  var UI={}, DATA=null, STATUS=null, SECRET=null, WX=null, lang="pt", filter="all";
  var VALID=["pt","en","ru","es","de"];

  var params=new URLSearchParams(location.search);
  var pl=params.get("lang"), sl=null;
  try{sl=localStorage.getItem("ntm-lang")}catch(e){}
  if(VALID.indexOf(pl)>=0) lang=pl; else if(VALID.indexOf(sl)>=0) lang=sl;

  var pt=params.get("theme"), st=null;
  try{st=localStorage.getItem("ntm-theme")}catch(e){}
  var theme=(pt==="light"||pt==="night")?pt:(st==="light"||st==="night")?st:"night";
  applyTheme(theme);

  function applyTheme(t){
    theme=t;
    if(t==="light") document.documentElement.setAttribute("data-theme","light");
    else document.documentElement.removeAttribute("data-theme");
    var b=document.getElementById("themeBtn"); if(b) b.textContent=(t==="light")?"☀":"☾";
    try{localStorage.setItem("ntm-theme",t)}catch(e){}
  }
  document.getElementById("themeBtn").onclick=function(){applyTheme(theme==="light"?"night":"light")};

  function q(url){var s="?lang="+lang+"&theme="+theme;return url+(url.indexOf("?")>=0?"&":"?")+s.slice(1)}
  function T(k){return UI[k]!=null?UI[k]:k}
  function L(obj){return obj&&(obj[lang]!=null?obj[lang]:obj.pt)}
  function eur(n){return "€"+String(n).replace(".",",")}
  var reduced=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  /* язык: круглая кнопка + меню 5 языков */
  var lb=document.getElementById("langBtn"), lm=document.getElementById("langMenu");
  function buildLangMenu(){
    var list=(DATA&&DATA.config&&DATA.config.languages)?DATA.config.languages:FALLBACK_LANGS;
    lm.innerHTML="";
    list.forEach(function(l){
      var b=document.createElement("button");
      if(l.code===lang) b.className="on";
      var c=document.createElement("span"); c.className="code"; c.textContent=l.code.toUpperCase();
      b.appendChild(c); b.appendChild(document.createTextNode(l.label));
      b.onclick=function(){closeLang(); if(l.code!==lang) setLang(l.code)};
      lm.appendChild(b);
    });
  }
  function closeLang(){lm.classList.remove("open");lb.setAttribute("aria-expanded","false")}
  lb.onclick=function(e){
    e.stopPropagation();
    var open=lm.classList.toggle("open");
    lb.setAttribute("aria-expanded",open?"true":"false");
    if(open) buildLangMenu();
  };
  document.addEventListener("click",function(e){if(!e.target.closest(".langwrap")) closeLang()});

  function setLang(l){
    lang=l; try{localStorage.setItem("ntm-lang",l)}catch(e){}
    loadUI(function(){fill(); renderChips(); renderCards(); renderSecret(); renderContrast(); renderStamp();});
  }
  function loadUI(cb){
    fetch("ui."+lang+".json").then(function(r){return r.json()}).then(function(j){UI=j;cb()})
      .catch(function(){UI={};cb()});
  }

  function stateOf(id){
    var s=STATUS&&STATUS.status&&STATUS.status[id];
    return s?s.state:"unknown";
  }
  function noteOf(id){
    var s=STATUS&&STATUS.status&&STATUS.status[id];
    return s&&s.noteKey?s.noteKey:null;
  }
  function openCount(){
    return DATA.trails.filter(function(t){return stateOf(t.id)==="open"}).length;
  }

  /* ── живая левада: сегменты воды между узлами-тропами ── */
  function buildLevada(){
    var svg=document.getElementById("levada");
    var n=DATA.trails.length, stepX=46, x0=26, W=x0*2+(n-1)*stepX;
    svg.setAttribute("viewBox","0 0 "+W+" 76");
    var parts=[];
    function ny(i){return 34+((i%2)?9:-9)}
    for(var i=0;i<n-1;i++){
      var x1=x0+i*stepX, y1=ny(i), x2=x0+(i+1)*stepX, y2=ny(i+1);
      var mx=(x1+x2)/2;
      var next=stateOf(DATA.trails[i+1].id);
      var cls=(next==="closed")?"dry":"flow";
      parts.push('<path class="seg '+cls+'" d="M'+x1+' '+y1+' Q'+mx+' '+((y1+y2)/2+((i%2)?-14:14))+' '+x2+' '+y2+'"/>');
    }
    for(var j=0;j<n;j++){
      var t=DATA.trails[j], xx=x0+j*stepX, yy=ny(j), stt=stateOf(t.id);
      parts.push('<g class="node" data-id="'+t.id+'"><circle class="'+stt+'" cx="'+xx+'" cy="'+yy+'" r="7"></circle>'+
        (stt==="closed"?'<path d="M'+(xx-3.5)+' '+(yy-3.5)+' l7 7 M'+(xx+3.5)+' '+(yy-3.5)+' l-7 7" stroke="var(--bad)" stroke-width="2" stroke-linecap="round"/>':'')+
        '<text x="'+xx+'" y="'+(yy+((j%2)?22:-14))+'">'+t.pr+'</text></g>');
    }
    svg.innerHTML=parts.join("");
    svg.querySelectorAll(".node").forEach(function(g){
      g.addEventListener("click",function(){
        var el=document.getElementById("card-"+g.getAttribute("data-id"));
        if(el) el.scrollIntoView({behavior:reduced?"auto":"smooth"});
      });
    });
  }

  /* ── одометр с накруткой ── */
  function runOdo(){
    var N=openCount(), total=DATA.trails.length;
    document.getElementById("odoOf").textContent="/"+total;
    var el=document.getElementById("odoN");
    if(reduced){el.textContent=N;return}
    var t0=null;
    function tick(ts){
      if(!t0)t0=ts;
      var p=Math.min((ts-t0)/900,1);
      el.textContent=Math.round(N*(0.5-0.5*Math.cos(Math.PI*p)));
      if(p<1) requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }

  /* ── погода: один батч-запрос Open-Meteo по всем тропам + Фуншал ── */
  function loadWeather(){
    var pts=DATA.trails.map(function(t){return t.start});
    pts.push(DATA.config.funchal);
    var la=pts.map(function(p){return p.lat}).join(",");
    var lo=pts.map(function(p){return p.lon}).join(",");
    var el=pts.map(function(p){return p.alt}).join(",");
    var url="https://api.open-meteo.com/v1/forecast?latitude="+la+"&longitude="+lo+"&elevation="+el+
      "&current=temperature_2m,wind_speed_10m,weather_code&timezone=auto";
    fetch(url).then(function(r){return r.json()}).then(function(j){
      WX=Array.isArray(j)?j:[j];
      renderCards(); renderContrast();
    }).catch(function(){WX=null});
  }
  function wIcon(c){
    if(c===0)return "☀️"; if(c<=2)return "🌤"; if(c===3)return "☁️";
    if(c===45||c===48)return "🌫"; if(c<=67)return "🌧"; if(c<=77)return "❄️";
    if(c<=82)return "🌦"; return "⛈";
  }
  function wxFor(i){
    if(!WX||!WX[i]||!WX[i].current)return null;
    return WX[i].current;
  }

  function renderContrast(){
    var box=document.getElementById("contrast");
    if(!WX){box.textContent="";return}
    var f=wxFor(DATA.trails.length), p=wxFor(0); /* Фуншал — последняя точка, PR1 — первая */
    if(!f||!p){box.textContent="";return}
    box.innerHTML=T("funchalLbl")+" <b>"+Math.round(f.temperature_2m)+"°</b> · "+
      T("ridgeLbl")+" <b>"+Math.round(p.temperature_2m)+"°</b> / "+Math.round(p.wind_speed_10m)+" "+T("windU");
  }

  function renderStamp(){
    var el=document.getElementById("stamp");
    var d=STATUS&&STATUS.meta&&STATUS.meta.updatedAt?new Date(STATUS.meta.updatedAt):null;
    var when=d?d.toLocaleString(lang==="ru"?"ru-RU":lang==="en"?"en-GB":lang==="de"?"de-DE":lang==="es"?"es-ES":"pt-PT",
      {day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"}):"—";
    el.innerHTML=T("updatedLbl")+" "+when+" · <a href=\""+DATA.config.statusSourceUrl+"\" target=\"_blank\" rel=\"noopener\">"+T("sourceLbl")+"</a>";
  }

  /* ── фильтры по типу тропы ── */
  var KINDS=["all","levada","mountain","forest","coastal"];
  function renderChips(){
    var box=document.getElementById("chips"); box.innerHTML="";
    KINDS.forEach(function(k){
      var b=document.createElement("button");
      b.className="fchip"+(filter===k?" on":"");
      b.textContent=T("kind_"+k);
      b.onclick=function(){filter=k;renderChips();renderCards()};
      box.appendChild(b);
    });
  }

  /* ── карточки троп ── */
  function renderCards(){
    var box=document.getElementById("cards"); box.innerHTML="";
    DATA.trails.forEach(function(t,i){
      if(filter!=="all"&&t.kind!==filter)return;
      var stt=stateOf(t.id), nk=noteOf(t.id)||t.routeNote;
      var card=document.createElement("div");
      card.className="tcard"+(stt==="closed"?" closed":"");
      card.id="card-"+t.id;
      var wx=wxFor(i), wxHtml="";
      if(wx){
        wxHtml='<div class="wx"><span>'+wIcon(wx.weather_code)+' <span class="t">'+Math.round(wx.temperature_2m)+
          '°</span></span><span>💨 '+Math.round(wx.wind_speed_10m)+' '+T("windU")+'</span><span>'+t.start.alt+' m</span></div>';
      }
      var feeTxt=t.fee>4.5?eur(t.fee):eur(4.5);
      var canBook=(stt==="open"||stt==="partial");
      card.innerHTML=
        '<div class="thead"><div><span class="pr">'+t.pr+'</span><h3>'+t.name+'</h3></div>'+
        '<span class="schip '+stt+'">'+T("status_"+stt)+'</span></div>'+
        '<p class="hl">'+L(t.highlight)+'</p>'+
        '<div class="meta"><span><b>'+t.lengthKm+'</b> km</span><span><b>'+t.durationH+'</b> '+T("hoursU")+'</span>'+
        '<span>'+T("diff_"+t.difficulty)+'</span></div>'+
        wxHtml+
        (nk?'<div class="note">'+T(nk)+'</div>':'')+
        '<div class="trow"><span class="fee"><b>'+feeTxt+'</b> · '+T("feeNote")+'</span>'+
        '<a class="book'+(canBook?'':' off')+'" href="'+DATA.config.bookingUrl+'" target="_blank" rel="noopener">'+
        (canBook?T("bookBtn"):T("closedBtn"))+'</a></div>';
      box.appendChild(card);
    });
  }

  /* ── секрет недели ── */
  function renderSecret(){
    if(!SECRET||!SECRET.secrets||!SECRET.secrets.length)return;
    var wk=Math.floor(Date.now()/6048e5); /* номер недели от эпохи */
    var s=SECRET.secrets[wk%SECRET.secrets.length];
    document.getElementById("secretBox").style.display="block";
    document.getElementById("secretTitle").textContent=L(s.title);
    document.getElementById("secretText").textContent=L(s.text);
    document.getElementById("secretSig").textContent=L(SECRET.signature);
    var more=document.getElementById("moreSecrets");
    if(DATA.config.guideBotUrl){more.style.display="inline-flex";more.href=DATA.config.guideBotUrl}
  }

  /* ── поведенческий показ Dubai Madeira ── */
  function checkDM(){
    var v=0;
    try{
      v=parseInt(localStorage.getItem("ntm-visits")||"0",10)+1;
      localStorage.setItem("ntm-visits",String(v));
    }catch(e){}
    if(v>=2){
      document.getElementById("dmBox").classList.add("on");
      document.getElementById("dmBtn").href=q(DATA.config.hubUrl);
    }
  }

  /* ── share ── */
  document.getElementById("shareBtn").onclick=function(){
    var txt=T("shareText")+" "+DATA.config.shareUrl+"?lang="+lang;
    if(navigator.share){navigator.share({text:txt}).catch(function(){})}
    else{
      var self=this;
      (navigator.clipboard?navigator.clipboard.writeText(txt):Promise.reject()).then(function(){
        self.textContent=T("shareCopied");
        setTimeout(function(){self.textContent=T("shareBtn")},1800);
      }).catch(function(){});
    }
  };

  function fill(){
    document.documentElement.lang=lang;
    document.documentElement.dir=UI.dir||"ltr";
    document.querySelectorAll("[data-ui]").forEach(function(el){
      el.textContent=T(el.getAttribute("data-ui"));
    });
    lb.textContent=lang.toUpperCase();
    lb.setAttribute("aria-label",T("langAria"));
    document.getElementById("themeBtn").setAttribute("aria-label",T("themeAria"));
    var f=document.getElementById("foot");
    f.innerHTML='© '+(new Date().getFullYear())+' <a href="'+q(DATA.config.hubUrl)+'" target="_blank" rel="noopener">SeedWave</a> · <a href="'+DATA.config.linkedinUrl+'" target="_blank" rel="noopener">Igor Kartuzov</a>';
  }

  /* ── старт ── */
  Promise.all([
    fetch("trails.json").then(function(r){return r.json()}),
    fetch("status.json").then(function(r){return r.json()}).catch(function(){return null}),
    fetch("secret.json").then(function(r){return r.json()}).catch(function(){return null})
  ]).then(function(res){
    DATA=res[0]; STATUS=res[1]; SECRET=res[2];
    loadUI(function(){
      fill(); buildLevada(); runOdo(); renderChips(); renderCards();
      renderSecret(); renderStamp(); checkDM(); loadWeather();
    });
  });
})();
</script>
</body>
</html>
